# Sealrail Backend - Nixpacks Build Config
# Railway auto-detects this file. It controls the build/start phases
# and avoids exposing runtime secrets as Docker build ARG/ENV.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x"]
cmds = [
  # Casper APT repo and client for testnet anchoring
  "mkdir -m 0755 -p /etc/apt/keyrings/",
  "curl -fsSL https://repo.casper.network/casper-repo-pubkey.gpg -o /etc/apt/keyrings/casper-repo-pubkey.gpg",
  "echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/casper-repo-pubkey.gpg] https://repo.casper.network/releases jammy main' > /etc/apt/sources.list.d/casper.list",
  "apt-get update -qq",
  "apt-get install -y -qq casper-client",
]

[phases.install]
# --include=dev guarantees devDependencies (typescript, vitest) install even
# if NODE_ENV=production leaks into the build environment - without it, npm
# ci silently honors that and skips them, and the next phase's `tsc` isn't
# found at all.
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

# Drop dev dependencies after build so the production image is lean
# and vitest/tsx/typescript are NOT in the runtime container.
[phases.postBuild]
cmds = ["npm prune --omit=dev"]

[start]
# Run the seed script first (idempotent - won't duplicate data),
# then start the compiled server.
cmd = "node dist/scripts/seed.js && node dist/index.js"

# Do NOT expose secrets during the build phase.
# Railway injects runtime env vars at container start, not at build time.
# This avoids the "SecretsUsedInArgOrEnv" Docker warning.
[build]
secrets = []
